<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <title>Célula en AR</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Modelo 3D de célula con hotspots en AR">
    <link rel="stylesheet" href="styles.css">
    <!-- Carga la librería oficial de model-viewer -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  </head>
  <body>
    <!-- Modelo 3D con hotspots -->
    <model-viewer src="celula-animal.glb"
                  ar
                  ar-modes="scene-viewer webxr quick-look"
                  camera-controls
                  tone-mapping="neutral"
                  poster="poster.webp"
                  shadow-intensity="1">

      <!-- Hotspots con anotaciones -->
      <button class="Hotspot" slot="hotspot-1" data-position="0m 0m 0m" data-normal="0m 1m 0m">
        <div class="HotspotAnnotation">Membrana celular</div>
      </button>

      <button class="Hotspot" slot="hotspot-2" data-position="0.1m 0.1m 0m" data-normal="0m 1m 0m">
        <div class="HotspotAnnotation">Núcleo</div>
      </button>

      <button class="Hotspot" slot="hotspot-3" data-position="0.2m 0.1m 0m" data-normal="0m 1m 0m">
        <div class="HotspotAnnotation">Mitocondria</div>
      </button>

      <!-- Barra de progreso -->
      <div class="progress-bar hide" slot="progress-bar">
        <div class="update-bar"></div>
      </div>

      <!-- Botón AR -->
      <button slot="ar-button" id="ar-button">Ver en tu espacio</button>
      <div id="ar-prompt">
        <img src="ar_hand_prompt.png" alt="AR prompt">
      </div>
    </model-viewer>

    <!-- Script de interacción -->
    <script src="script.js"></script>
  </body>
</html>
